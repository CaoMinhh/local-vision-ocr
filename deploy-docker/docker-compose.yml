services:
  # FastAPI OCR Application
  ocr-app:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile
    container_name: local-vision-ocr
    ports:
      - "8000:8000"
    environment:
      # FastAPI app metadata
      APP_TITLE: "OCR → MD/JSON"
      APP_VERSION: "0.1.0"

      # Server configuration
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"

      # CORS configuration
      CORS_ALLOW_ORIGINS: "*"

      # Ollama configuration (connect to ollama service)
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "nemotron3:33b"
      OLLAMA_THINK: "1"
      OLLAMA_TIMEOUT_SEC: "600"

      # OCR configuration
      OCR_PDF_SCALE: "2.0"
      OCR_MAX_PARALLEL: "1"
      OCR_BACKGROUND_MAX_CONCURRENT: "2"
      OCR_MAX_EDGE: "0"
      OCR_JPEG_QUALITY: ""

      # MongoDB configuration (optional - comment out if not needed)
      MONGODB_URI: "mongodb://admin:password@mongo:27017"
      MONGODB_DB_NAME: "nemotron3_ocr"
      MONGODB_COLLECTION_OCR: "ocr_runs"
      MONGODB_COLLECTION_APP_SETTINGS: "ocr_app_settings"

      # OCR history storage
      OCR_HISTORY_STORE_INPUT_B64: "1"
      OCR_HISTORY_MAX_INPUT_BYTES: "6000000"

      # GPU/NVIDIA SMI configuration (optional)
      NVIDIA_SMI_PATH: "nvidia-smi"
      NVIDIA_SMI_TIMEOUT_SEC: "8"
      GPU_WS_INTERVAL_SEC: "1.5"

    depends_on:
      ollama:
        condition: service_started
      mongo:
        condition: service_healthy

    networks:
      - ocr-network

    volumes:
      # Mount for persistent data/cache (optional)
      - ocr-data:/app/data
      # Mount nvidia-smi from host for GPU monitoring
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro

    # Enable GPU support (requires nvidia-docker2 installed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped

  # Ollama Service for Vision Models
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"

    environment:
      OLLAMA_HOST: "0.0.0.0:11434"

    volumes:
      # Persist downloaded models across container restarts
      - ollama-models:/root/.ollama

    networks:
      - ocr-network

    restart: unless-stopped

    # Enable GPU support (requires nvidia-docker2 installed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # MongoDB Service (Optional - for OCR history)
  mongo:
    image: mongo:6
    container_name: mongo-ocr
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: nemotron3_ocr

    volumes:
      # Persist MongoDB data
      - mongo-data:/data/db

    networks:
      - ocr-network

    restart: unless-stopped

    healthcheck:
      test: mongosh --eval 'db.adminCommand("ping")' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ocr-network:
    driver: bridge

volumes:
  ollama-models:
    driver: local
  mongo-data:
    driver: local
  ocr-data:
    driver: local
